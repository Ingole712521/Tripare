name: Terraform CI

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -refresh=false -no-color -input=false \
            -var-file=terraform.tfvars \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            infra/envs/${{ matrix.environment }}/plan_output.txt
            infra/envs/${{ matrix.environment }}/tfplan

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planPath = 'infra/envs/${{ matrix.environment }}/plan_output.txt';
            let plan = 'Plan output not available';
            try {
              plan = fs.readFileSync(planPath, 'utf8');
            } catch (e) {
              plan = 'Could not read plan output';
            }
            const maxLen = 60000;
            if (plan.length > maxLen) {
              plan = plan.substring(0, maxLen) + '\n... (truncated)';
            }
            const output = `#### Terraform Plan - \`${{ matrix.environment }}\` 📝

            **Format:** \`${{ steps.fmt.outcome }}\`
            **Validate:** \`${{ steps.validate.outcome }}\`
            **Plan:** \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
